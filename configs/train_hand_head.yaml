data:
  data_root: "/home/marian/3dv/data/hot3d_aria/raw_data"
  num_frames: 16
  resolution: [224, 224]
  clip_stride: 8
  val_split: 0.02
  num_workers: 4

model:
  checkpoint: "models/NeoVerse/reconstructor.ckpt"
  freeze_backbone: true
  enable_hand: true
  enable_cam: false
  enable_pts: false
  enable_depth: false
  enable_norm: false
  enable_motion: false
  enable_gs: false

training:
  lr: 1e-4
  min_lr: 1e-6
  epochs: 1
  batch_size: 1
  grad_accum_steps: 4
  log_every: 250    # steps between train loss logs
  val_every: 250    # steps between validation runs
  save_every: 1000  # steps between checkpoint saves
  seed: 42
  output_dir: "checkpoints/full_epoch"

visualization:
  mano_model_folder: "models/MANO"
  num_vis_frames: 4

debug:
  enabled: false
  max_sequences: 100
  single_frame: true

wandb:
  enabled: true
  project: "hand-head-training"
  entity: 3DV-Project
  run_name: "Full Epoch"
  tags: []
  notes: null
