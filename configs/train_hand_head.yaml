data:
  data_root: "/home/marian/3dv/data/hot3d_aria/raw_data"
  num_frames: 16
  resolution: [224, 224]
  clip_stride: 8
  val_split: 0.1
  num_workers: 4

model:
  checkpoint: "models/NeoVerse/reconstructor.ckpt"
  freeze_backbone: true
  enable_hand: true
  enable_cam: false
  enable_pts: false
  enable_depth: false
  enable_norm: false
  enable_motion: false
  enable_gs: false

training:
  lr: 1e-4
  min_lr: 1e-6
  epochs: 10
  batch_size: 1
  log_every: 250    # steps between train loss logs
  val_every: 250    # steps between validation runs
  save_every: 10    # epochs between checkpoint saves
  seed: 42
  output_dir: "checkpoints"
  output_weights: "hand_head_weights.pt"

debug:
  enabled: true
  max_sequences: 10

wandb:
  enabled: true
  project: "hand-head-training"
  entity: 3DV-Project
  run_name: Test
  tags: []
  notes: null
