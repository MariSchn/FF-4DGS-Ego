# ------------------------------------------------------------------
# Data
# ------------------------------------------------------------------
data:
  # Root folder containing one subdir per sequence. Each sequence must have
  # video_main_rgb.mp4 and hand_data/mano_hand_pose_trajectory.jsonl
  data_root: "/home/marian/3dv/data/hot3d_aria/raw_data"
  # Number of frames per clip (sliding window over video). Full video is too long to fit in memory.
  num_frames: 16
  # [height, width] to which video frames are resized
  resolution: [224, 224]
  # Step between consecutive clips when sliding over a video (stride=num_frames -> non-overlapping)
  clip_stride: 8
  # Fraction of sequences used for validation (0.0 = no validation; 0.1 = 10% held out)
  val_split: 0.01
  # DataLoader workers for loading video clips
  num_workers: 2
# ------------------------------------------------------------------
# Model
# ------------------------------------------------------------------
model:
  # Path to pretrained WorldMirror / reconstructor checkpoint
  checkpoint: "models/NeoVerse/reconstructor.ckpt"
  # Freeze backbone; only hand head is trained
  freeze_backbone: true
  # Enable hand prediction head
  enable_hand: true
  # Hand head type: "hamer" (Hamer-style cross-attention) or "dpt" (dense prediction)
  hand_head_type: "hamer"
  # Enable hand crop (ROI Align on features around detected hand bbox)
  use_hand_crop: true
  # Crop feature map size (output of ROI Align per hand)
  hand_crop_size: 8

  # Disable other heads
  enable_cam: true
  enable_pts: false
  enable_depth: false
  enable_norm: false
  enable_motion: false
  # Phase 2: re-enable GS so the Hand→GS refiner can shift Gaussian centers
  # inside hand bboxes. The rendering path runs but does not yet feed into
  # a loss — consistency loss lands in Phase 3.
  enable_gs: true
  # Phase 2: activate the hand↔GS cross-attention refiner head.
  enable_hand_gs_refiner: true

  # HaMeR head architecture (only used when hand_head_type == "hamer")
  hamer_head_kwargs:
    dim: 1024
    depth: 6
    heads: 8
    dim_head: 64
    mlp_dim: 1024
    dropout: 0.0
    crop_global_depth: 1
    # Activation checkpointing on the transformer blocks. Trades a little
    # extra compute per step for noticeably lower peak memory so batch_size=32
    # fits on one GPU.
    use_gradient_checkpoint: true

  # Hand↔GS refiner head: per-pixel Δxyz for Gaussians inside hand bboxes.
  hand_gs_refiner_kwargs:
    heads: 4
    dim_head: 64
    mlp_dim: 256
    dropout: 0.0
    max_offset: 0.05

# ------------------------------------------------------------------
# Loss weights (per-term). HaMeR's defaults were tuned for their rotmat
# representation + weak-perspective cam head, and were too weak for our
# 32-D layout (quat + PCA + absolute meter-scale transl). These values
# make the overfit-on-one-clip test converge tightly (per-dim transl MSE
# ≈ 1e-4 / wrist position within ~2 cm). See scripts/debug_hand_params.py.
# ------------------------------------------------------------------
loss_weights:
  kp3d:          0.05
  kp2d:          0.05    # bumped from HaMeR's 0.01 — reinforces projection
  global_orient: 0.01    # bumped 10x — rotmat MSE on a single 3x3
  hand_pose:     0.01    # bumped 10x — MSE on 15 PCA coeffs
  betas:         0.01    # bumped 20x — hand-size was converging too slowly
  transl:        0.1     # 100x bump — meter-scale; needs real weight for depth

# ------------------------------------------------------------------
# Training
# ------------------------------------------------------------------
training:
  lr: 1e-4
  min_lr: 1e-7           # Minimum LR for cosine annealing scheduler
  epochs: 1
  batch_size: 32
  grad_accum_steps: 1    # Effective batch = batch_size * grad_accum_steps
  log_every: 500         # Steps between train loss logs (console + W&B)
  val_every: 500         # Steps between validation runs
  save_every: 1000       # Steps between checkpoint saves
  seed: 42               # Random seed
  output_dir: "checkpoints/default"
  grad_clip_norm: 1.0    # Max L2 norm for gradients (circuit breaker on loss spikes)

  # 3D self-supervised consistency between hand head and Gaussian head.
  # Phase 3: enabled. Pulls hand-region Gaussian centers toward predicted
  # MANO vertices; linear warmup keeps the signal from dominating early.
  consistency_loss:
    enabled: true
    weight: 0.0005
    warmup_steps: 3000           # Linearly ramp weight 0 -> target over this many steps
    mano_folder: "models/MANO"
    target: "vertices"          # "vertices" (778/hand) or "joints" (21/hand)
    mask_threshold: 0.5          # hand-region mask threshold
    max_samples_per_frame: 128   # top-K hand GS samples per frame

# ------------------------------------------------------------------
# Visualization
# ------------------------------------------------------------------
visualization:
  # Folder containing MANO_LEFT.pkl and MANO_RIGHT.pkl for hand mesh rendering
  mano_model_folder: "models/MANO"
  # Number of sample frames to render as hand overlays (GT vs pred) in W&B
  num_vis_frames: 4

# ------------------------------------------------------------------
# Hand Crop (HaMeR-style bbox parameters)
# ------------------------------------------------------------------
hand_crop:
  # Rescale factor for hand bounding box (matches HaMeR default of 2.0x) 
  # The tight MANO mesh bbox is expanded by this factor to provide context
  rescale_factor: 1.5

# ------------------------------------------------------------------
# Debug
# ------------------------------------------------------------------
debug:
  enabled: false          # When true, apply max_sequences limit to limit the number of sequences used for training
  max_sequences: 5       # Use only this many sequences (from data_root)
  single_frame: false     # Overfit on a single clip from first sequence; disables validation

# ------------------------------------------------------------------
# Weights & Biases
# ------------------------------------------------------------------
wandb:
  enabled: true
  project: "hand-head-training"
  entity: 3DV-Project
  run_name: "Loss Test Full Epoch"
  tags: []
  notes: null
